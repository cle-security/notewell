# yaml-language-server: $schema=./schemas/cle-config.schema.json

version: 1

# Which requirement baseline to verify against. Run `cle list-baselines`
# to see what ships built-in, or reference a custom baseline by file path.
baseline: asvs-l1

# Optional: subset or exclude requirements. `include` is a list of ids
# or fnmatch globs; `exclude` entries pair a pattern with a rationale.
# requirements:
#   include:
#     - V5.*
#   exclude:
#     - requirement: V8.3.*
#       reason: No file uploads in this codebase.

# Optional: scope which files are analyzed.
# scope:
#   include:
#     - "src/**"
#   exclude:
#     - "**/*.test.ts"

# Optional: reviewed exceptions to known findings.
# suppressions:
#   - requirement: V5.1.4
#     path: src/legacy/parser.ts
#     reason: Legacy module scheduled for rewrite Q2
#     expires: 2026-06-01

# LLM and concurrency tuning.
agent:
  model: ollama:deepseek-v4-pro:cloud
  max_concurrency: 4

# Optional: how findings are reported. Default is `pretty` to stdout.
# reporters:
#   - type: sarif
#     output: results.sarif
#   - type: pretty
