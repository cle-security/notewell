# yaml-language-server: $schema=./cle-config.schema.json
#
# Drop a copy of cle's published JSON schema at the path above (or
# remove this line) so VSCode autocompletes fields. The schema lives
# in the cle repo at cle_cli/cle_cli/schemas/cle-config.schema.json.

version: 1

packs:
  - asvs-l2

# The verifier reads `context` as a Markdown briefing and lets it
# inform applicability decisions ("no MFA isn't a gap — it's out of
# scope by design"). Be honest about what the app is and isn't;
# inflated context produces inflated findings.
context: |
  ## Stack

  - Backend: Node 20 + TypeScript + Fastify + Prisma + SQLite
  - Frontend: Vue 3 + Vite + Pinia + Vue Router
  - pnpm workspaces (apps/api, apps/web, packages/types)
  - SQLite is in-process; no database server
  - File uploads stored on local disk under uploads/, served via API with per-request access checks

  ## Authentication and sessions

  Local signup with email + password. Argon2id for password hashing. Sessions are signed httpOnly sameSite=lax cookies, DB-backed.

  ## Rendering

  Note bodies and user bios are markdown, rendered client-side via marked + DOMPurify → v-html.

  ## Roles

  Two roles: regular user and admin. Admin is seedable via env; no self-service admin promotion.

agent:
  #model: openai:moonshotai/Kimi-K2.6 # Infomaniak
  model: ollama:kimi-k2.6:cloud # Ollama Cloud
  #model: ollama:gemma4:31b-cloud # Ollama Cloud
  #model: anthropic:claude-opus-4-7
  max_concurrency: 25
  timeout_seconds: 60000
  thinking: "high"

output:
  default_reporter: pretty

observability:
  # Only a demo repo - nothing sensitive
  dangerously_disable_log_scrubbing: true
