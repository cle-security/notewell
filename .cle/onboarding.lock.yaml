  source: agent
- requirement:
    id: V9.1.1
    statement: Verify that self-contained tokens are validated using their digital
      signature or MAC to protect against tampering before accepting the token's contents.
  reason: The app uses reference tokens (session IDs stored in the Session table in
    SQLite), not self-contained tokens (JWTs or similar). No JWT libraries in package.json.
    Searched for 'jwt', 'JWT', 'jose', 'jws', 'jwe', 'jwk' — no matches. Session validation
