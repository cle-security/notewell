  source: agent
- requirement:
    id: V9.1.2
    statement: Verify that only algorithms on an allowlist can be used to create and
      verify self-contained tokens, for a given context. The allowlist must include
      the permitted algorithms, ideally only either symmetric or asymmetric algorithms,
      and must not include the 'None' algorithm. If both symmetric and asymmetric
      must be supported, additional controls will be needed to prevent key confusion.
  reason: No self-contained tokens (JWTs) are created or verified — sessions use reference
    tokens stored in the database (apps/api/src/lib/sessions.ts). No token signing
    algorithms beyond the cookie signing done by @fastify/cookie, which is not the
    subject of this requirement.
  source: agent
- requirement:
    id: V9.1.3
    statement: Verify that key material that is used to validate self-contained tokens
      is from trusted pre-configured sources for the token issuer, preventing attackers
      from specifying untrusted sources and keys. For JWTs and other JWS structures,
      headers such as 'jku', 'x5u', and 'jwk' must be validated against an allowlist
      of trusted sources.
  reason: No self-contained tokens — sessions are reference tokens only. There are
    no JWT headers like 'jku', 'x5u', or 'jwk' to validate. Key material for cookie
    signing comes from SESSION_SECRET env var, not from token headers.
  source: agent
- requirement:
    id: V9.2.1
    statement: Verify that, if a validity time span is present in the token data,
      the token and its content are accepted only if the verification time is within
