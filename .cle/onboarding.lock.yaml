open_questions:
- id: are-production-secrets-such-as-session-s
  question: Are production secrets such as SESSION_SECRET and DATABASE_URL injected
    from a secrets manager or key vault (e.g., AWS Secrets Manager, HashiCorp Vault,
    Kubernetes secrets), or are they stored only as plain environment variables on
    the host?
  why: The application loads secrets exclusively via process.env in apps/api/src/lib/env.ts
    with no in-repo secrets manager integration. The out-of-repo deployment approach
    determines whether a secrets management solution is in use.
  affects:
  - V13.3.1
  - V13.3.2
  status: answered
  answer: No — plain environment variables on the host
  choices:
  - label: Yes — a secrets manager or key vault is used in production
    description: Secrets are injected from a dedicated secrets management solution
      rather than plain host env vars.
  - label: No — plain environment variables on the host
    description: Secrets are configured only as standard environment variables on
      the server.
- id: is-the-application-deployed-behind-a-tls
  question: Is the application deployed behind a TLS-terminating reverse proxy (such
    as Nginx, Caddy, or a cloud load balancer) in production, and does that layer
    add security headers such as HSTS, CSP, or CORS?
  why: The application listens on plain HTTP (port 3000) and does not configure TLS
    or security headers in the Fastify source. Without confirmation of an upstream
    proxy, it is unclear whether transport encryption and browser-security headers
    are handled out-of-repo.
  affects:
  - V3.4.1
  - V3.4.2
  - V3.4.3
  - V3.4.4
  - V3.4.5
  - V3.4.6
  - V4.1.2
  - V4.1.3
  - V12.1.1
  - V12.1.2
  - V12.2.1
  - V12.2.2
  - V12.3.1
  - V12.3.2
  - V12.3.3
  - V12.3.4
  status: answered
  answer: Yes — TLS and headers are handled by a reverse proxy
  choices:
  - label: Yes — TLS and headers are handled by a reverse proxy
    description: A reverse proxy or load balancer terminates TLS and adds HSTS, CSP,
      CORS, or other headers in production.
  - label: No — the application is served directly on plain HTTP
    description: There is no TLS-terminating reverse proxy or load balancer; the app
      is exposed directly on HTTP.
