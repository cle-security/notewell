open_questions:
- id: is-the-application-deployed-behind-a-tls
  question: Is the application deployed behind a TLS-terminating reverse proxy (e.g.,
    Nginx, Caddy, a cloud load balancer) that enforces HTTPS, or is the app directly
    exposed to the internet over plain HTTP?
  why: The codebase has no TLS/HTTPS configuration — Fastify binds to 0.0.0.0:3000
    with no TLS setup. I need to know whether TLS is handled externally.
  affects:
  - V12.1.1
  - V12.1.2
  - V12.2.1
  - V12.2.2
  - V12.3.1
  - V12.3.2
  - V12.3.3
  - V12.3.4
  - V4.1.2
  - V3.4.1
  - V3.3.1
  status: answered
  answer: Yes — TLS terminates at a reverse proxy
  choices:
  - label: Yes — TLS terminates at a reverse proxy
    description: A reverse proxy or cloud load balancer handles HTTPS and forwards
      to the app over plain HTTP internally.
  - label: No — the app is directly exposed
    description: The Fastify server handles connections directly with no TLS-terminating
      proxy in front.
  - label: Not yet decided / varies by env
    description: Deployment topology isn't final or differs between environments.
- id: is-there-any-waf-api-gateway-or-rate-lim
  question: Is there any WAF, API gateway, or rate-limiting layer in front of the
    application, or is the Fastify app the only thing processing requests?
  why: The app itself has no rate-limiting middleware. I need to determine whether
    anti-automation controls exist outside the codebase.
  affects:
  - V2.4.1
  - V6.3.1
  - V6.1.1
  status: answered
  answer: No — only the app itself
  choices:
  - label: Yes — external rate-limiting/WAF
    description: There is a WAF, API gateway, or similar proxy that enforces rate
      limits before traffic reaches Fastify.
  - label: No — only the app itself
    description: Fastify is the only layer; no external rate limiting or WAF is in
      place.
  - label: Unsure / varies
    description: There may be something but it's not guaranteed or varies by environment.
