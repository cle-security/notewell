open_questions:
- id: are-rate-limiting-or-anti-automation-con
  question: Are rate limiting or anti-automation controls in place anywhere outside
    the application code — in Caddy, at the host firewall level, or elsewhere? The
    application code has no rate limiting on login/signup endpoints.
  why: The app has no rate limiting code (no express-rate-limit or similar). V6.3.1
    requires controls against credential stuffing and brute force, and V6.1.1 requires
    documentation of those controls.
  affects:
  - V6.1.1
  - V6.3.1
  status: answered
  answer: No — no rate limiting
  choices:
  - label: No — no rate limiting
    description: No rate limiting or anti-automation exists anywhere currently.
  - label: Yes — Caddy handles rate limiting
    description: Caddy has rate-limiting directives or a plugin configured.
  - label: Yes — host-level firewall
    description: A host-level firewall or iptables-like solution limits request rates.
- id: is-the-production-deployment-exactly-as
  question: Is the production deployment exactly as shown in docker-compose.yml —
    Caddy terminates TLS (with Let's Encrypt), serves the SPA, and reverse-proxies
    /api/* to the Fastify container on an internal Docker network? Or are there additional
    infrastructure components like a cloud load balancer, CDN, or WAF in front?
  why: The Caddyfile shows HSTS and security headers; docker-compose shows Caddy handling
    TLS. I need to confirm this reflects production reality for V12.1.1, V12.2.1,
    V12.2.2, V3.4.1, and V3.2.1.
  affects:
  - V3.2.1
  - V3.4.1
  - V3.4.2
  - V12.1.1
  - V12.2.1
  - V12.2.2
  status: answered
  answer: Yes — Caddy as shown, no additional infra
  choices:
  - label: Yes — Caddy as shown, no additional infra
    description: Single VM with Caddy handling TLS termination, SPA serving, and API
      reverse-proxying. No CDN, no cloud LB, no WAF.
  - label: Cloud load balancer terminates TLS
    description: Caddy runs behind a cloud load balancer that handles TLS termination,
      then forwards to Caddy on plain HTTP.
  - label: CDN in front (e.g. Cloudflare)
    description: A CDN sits in front of the origin, terminating TLS for external clients.
- id: is-there-a-password-change-feature-that
  question: Is there a password-change feature that exists outside the repo (e.g.,
    an admin-only mechanism or a feature planned but not yet in the code)? The API
    has no password-change endpoint — users can update displayName and bio via PUT
    /me/profile, but there's no route to change a password.
  why: V6.2.2 and V6.2.3 require users to be able to change their password — I found
    no password-change endpoint in the routes.
  affects:
  - V6.2.2
  - V6.2.3
  status: answered
  answer: No — not yet implemented
  choices:
  - label: No — not yet implemented
    description: No password change feature exists anywhere — it hasn't been built
      yet.
  - label: Out-of-band admin reset only
    description: Admins can change any user's password via some out-of-band mechanism
      (SSH, DB access).
- id: the-seed-script-creates-a-site-admin-use
  question: The seed script creates a "Site Admin" user with a password from environment
    variables. In production, is this admin password changed after initial deployment?
    Is the seed script run more than once?
  why: The seed script has a default password "adminpass123" if no env var is set.
    V6.4.1 concerns system-generated initial passwords/activation codes expiring —
    the seed script's admin creation pattern is relevant.
  affects:
  - V6.4.1
  - V6.3.2
  status: answered
  answer: Seed runs once, password changed after
  choices:
  - label: Seed runs once, password changed after
    description: The seed runs once at deploy-time with a strong password from env
      vars, then the admin changes it.
  - label: Seed runs once, password not changed
    description: The seed runs once at deploy-time; the password set via env vars
      becomes the permanent admin password.
  - label: Seed uses default password
    description: The default adminpass123 is used because ADMIN_PASSWORD is not set
      in production.
