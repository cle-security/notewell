open_questions:
- id: is-the-api-deployed-behind-a-tls-termina
  question: Is the API deployed behind a TLS-terminating reverse proxy (e.g., Caddy,
    Nginx, HAProxy) so that external traffic reaches the app over HTTPS?
  why: The Fastify server in index.ts listens on plain HTTP with no TLS configuration;
    deployment TLS behavior affects several requirements.
  affects:
  - V3.4.1
  - V12.2.1
  - V12.2.2
  - V12.3.1
  - V12.3.2
  - V12.3.3
  - V12.3.4
  - V4.1.2
  status: answered
  answer: 'Yes'
  choices: []
- id: is-this-a-single-tenant-application-one
  question: Is this a single-tenant application (one deployment serves one organization/user)
    or multi-tenant (one deployment serves multiple organizations with data isolation)?
  why: The data model has no tenant field; all users share the same database. This
    affects whether multi-tenant authorization requirements apply.
  affects:
  - V8.4.1
  status: answered
  answer: single-tenant
  choices: []
