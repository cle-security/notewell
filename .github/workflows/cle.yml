# Runs cle against this repo on every push to main and on PRs from
# same-repo branches. SARIF lands in the Security tab; the github
# reporter adds inline annotations on PRs.
#
# Skips PRs from forks — the verifier reads file contents, and a
# malicious fork PR could embed prompt injection that ends up in
# published findings. Run cle on fork PRs manually after a code review.

name: Clé security review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # SARIF upload
  pull-requests: read # github reporter annotations

concurrency:
  group: cle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Same-repo PRs and push/dispatch events always run; fork PRs are skipped.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # --since mode walks back to the PR base; needs full history.
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Install cle
        env:
          CLE_TOKEN: ${{ secrets.CLE_INSTALL_TOKEN }}
        run: |
          uv tool install --from \
            "git+https://x-access-token:${CLE_TOKEN}@github.com/cle-security/cle.git#subdirectory=cle_cli" \
            cle-cli

      - name: Run cle (PR diff)
        if: github.event_name == 'pull_request'
        env:
          #OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          #OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          #OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          OLLAMA_BASE_URL: https://ollama.com/v1
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
        run: |
          cle verify \
            --since origin/${{ github.base_ref }} \
            --reporter sarif-github:cle-results-github.sarif \
            --reporter sarif:cle-results.sarif \
            --no-fail

      - name: Run cle (full scan)
        if: github.event_name != 'pull_request'
        env:
          #OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          #OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          #OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          OLLAMA_BASE_URL: https://ollama.com/v1
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
        run: |
          cle verify \
            --reporter sarif-github:cle-results-github.sarif \
            --reporter sarif:cle-results.sarif \
            --no-fail

      - name: Upload SARIF as artifact
        if: always() && (hashFiles('cle-results-github.sarif') != '' || hashFiles('cle-results.sarif') != '')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cle-results
          path: |
            cle-results-github.sarif
            cle-results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        # Always upload — even if cle exited 1 because findings exist.
        # The hashFiles guard skips upload when cle crashed before writing.
        if: always() && hashFiles('cle-results-github.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: cle-results-github.sarif
          category: cle
